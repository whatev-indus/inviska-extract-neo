name: Rust port CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust-core:
    name: Rust core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - ubuntu-24.04
          - windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Test core
        working-directory: neo
        run: cargo test -p inviska-core

  tauri-desktop:
    name: Tauri desktop shell
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Test workspace
        working-directory: neo
        run: cargo test

      - name: Build desktop shell
        working-directory: neo
        run: cargo build -p inviska-desktop
