name: Release Qt app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag and version
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create source archives
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          APP="Inviska Extract Neo"
          git archive --format=zip  --prefix="${APP}_${VERSION}/" HEAD -o "${APP}_Source_${VERSION}.zip"
          git archive --format=tar.gz --prefix="${APP}_${VERSION}/" HEAD -o "${APP}_Source_${VERSION}.tar.gz"

      - name: Create release (skip if already exists)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          APP="Inviska Extract Neo"
          if gh release view "${TAG}" &>/dev/null; then
            echo "Release ${TAG} already exists — uploading source archives only"
            gh release upload "${TAG}" \
              "${APP}_Source_${VERSION}.zip" \
              "${APP}_Source_${VERSION}.tar.gz" \
              --clobber
          else
            gh release create "${TAG}" \
              --title "Inviska Extract Neo ${TAG}" \
              --generate-notes \
              "${APP}_Source_${VERSION}.zip" \
              "${APP}_Source_${VERSION}.tar.gz"
          fi

  macos-arm:
    name: macOS ARM
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        run: brew install qt

      - name: Build
        run: |
          qmake CONFIG+=BuildRelease
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          APP="Inviska Extract Neo"
          macdeployqt "release/${APP}.app"
          ditto -c -k --keepParent "release/${APP}.app" "${APP}_macOS_ARM_${VERSION}.zip"
          gh release upload "${TAG}" "${APP}_macOS_ARM_${VERSION}.zip" --clobber

  linux:
    name: Linux ${{ matrix.label }} AppImage
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x64
            runner: ubuntu-24.04
            arch: x86_64
          - label: ARM
            runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-tools-dev-tools \
            libgl-dev libxcb-cursor-dev libfuse2

      - name: Build
        run: |
          qmake6 CONFIG+=BuildRelease
          make -j$(nproc)

      - name: Create AppImage
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          ARCH: ${{ matrix.arch }}
          LABEL: ${{ matrix.label }}
        run: |
          APP="Inviska Extract Neo"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${ARCH}.AppImage"
          chmod +x linuxdeploy-*.AppImage

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp release/invmextr AppDir/usr/bin/invmextr

          cat > AppDir/usr/share/applications/inviska-extract-neo.desktop << 'EOF'
          [Desktop Entry]
          Name=Inviska Extract Neo
          Exec=invmextr
          Icon=inviska-extract-neo
          Type=Application
          Categories=AudioVideo;
          EOF

          cp Resources/Icon.png AppDir/usr/share/icons/hicolor/256x256/apps/inviska-extract-neo.png

          QMAKE=qmake6 APPIMAGE_EXTRACT_AND_RUN=1 \
            ./linuxdeploy-${ARCH}.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

          mv Inviska_Extract_Neo*.AppImage "${APP}_Linux_${LABEL}_${VERSION}.AppImage"

      - name: Upload artifact
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          APP="Inviska Extract Neo"
          gh release upload "${TAG}" "${APP}_Linux_${LABEL}_${VERSION}.AppImage" --clobber

  windows-x64:
    name: Windows x64
    needs: create-release
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: win64_mingw
          tools: 'tools_mingw1310'

      - name: Add MinGW to PATH
        shell: bash
        run: echo "${IQTA_TOOLS}/mingw1310_64/bin" >> "$GITHUB_PATH"

      - name: Build
        shell: bash
        run: |
          qmake CONFIG+=BuildRelease
          mingw32-make -j$(nproc)

      - name: Deploy Qt dependencies
        shell: bash
        run: |
          mkdir deploy
          cp "release/InviskaExtractNeo.exe" deploy/
          windeployqt --release "deploy/InviskaExtractNeo.exe"

      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
        shell: pwsh
        run: |
          $APP = "Inviska Extract Neo"
          $ZIP = "${APP}_Windows_x64_${env:VERSION}.zip"
          Compress-Archive -Path deploy\* -DestinationPath $ZIP
          gh release upload "${{ needs.create-release.outputs.tag }}" $ZIP --clobber
